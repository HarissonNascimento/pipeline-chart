{{- range .Values.instances }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .name }}
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .wave }}"
spec:
  replicas: 1

  selector:
    matchLabels:
      app: {{ .name }}

  template:
    metadata:
      labels:
        app: {{ .name }}
    spec:
      containers:
        - name: {{ .name }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}

          env:
            - name: DEPLOYMENT_NAME
              value: "{{ .name }}"
            - name: APP_PORT
              value: "{{ .port }}"

          ports:
            - containerPort: {{ .port }}

  strategy:
    canary:
      steps:
        - setWeight: 100
        - pause: {}
---
{{- end }}